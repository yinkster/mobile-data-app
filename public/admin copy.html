<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-2xl font-bold mb-6">Engagement Overview</h1>

    <div class="flex justify-between items-center mb-8">
    <h1 class="text-2xl font-bold text-gray-800">Engagement Overview</h1>
        <a href="/api/logout" class="text-sm font-semibold text-red-600 hover:text-red-800 bg-red-50 px-4 py-2 rounded-lg border border-red-200">
        Logout
        </a>
    </div>    

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-indigo-500">
                <p class="text-sm text-gray-500 uppercase font-bold">Total Engaged</p>
                <p id="totalEngaged" class="text-3xl font-black text-gray-800">0</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-green-500">
                <p class="text-sm text-gray-500 uppercase font-bold">Newly Saved (1)</p>
                <p id="status1" class="text-3xl font-black text-gray-800">0</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-orange-500">
                <p class="text-sm text-gray-500 uppercase font-bold">Interested (4)</p>
                <p id="status4" class="text-3xl font-black text-gray-800">0</p>
            </div>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-sm mb-8">
            <canvas id="chartCanvas"></canvas>
        </div>

        <div class="flex flex-wrap gap-4">
            <a href="/api/export" class="bg-green-600 text-white px-6 py-3 rounded-lg font-bold shadow hover:bg-green-700">
                📥 Download CSV
            </a>
            <button onclick="location.href='/index.html'" class="bg-white border px-6 py-3 rounded-lg">
                + New Entry
            </button>
        </div>
    </div>
    
    <script>
        async function loadDashboard() {
            try {
                // 1. Fetch Summary Counts
                const sumRes = await fetch('/api/summary');
                const summary = await sumRes.json();
                document.getElementById('totalEngaged').innerText = summary.total_engaged;
                document.getElementById('status1').innerText = summary.status_1;
                document.getElementById('status4').innerText = summary.status_4;

                // 2. Fetch Chart Data
                const statRes = await fetch('/api/stats');
                const chartData = await statRes.json();

                new Chart(document.getElementById('chartCanvas'), {
                    type: 'bar',
                    data: {
                        labels: chartData.map(d => d.category),
                        datasets: [{
                            label: 'People per Status',
                            data: chartData.map(d => d.total),
                            backgroundColor: '#6366f1',
                            borderRadius: 6
                        }]
                    },
                    options: { responsive: true }
                });
            } catch (e) {
                console.error("Auth error or connection issue");
                window.location.href = "/login.html"; // Redirect if session expired
            }
        }
        loadDashboard();
    </script>
</body>
</html>
