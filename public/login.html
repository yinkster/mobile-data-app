<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm border border-gray-200">
        <h2 class="text-2xl font-bold mb-6 text-gray-800 text-center">Admin Portal</h2>
        
        <div class="space-y-4">
            <input id="user" type="text" placeholder="Username" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
            <input id="pw" type="password" placeholder="Password" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
            <button onclick="login()" id="loginBtn" class="w-full bg-indigo-600 text-white font-bold p-3 rounded-lg hover:bg-indigo-700 transition-colors">
                SIGN IN
            </button>
        </div>
        <p id="errorMsg" class="mt-4 text-center text-red-500 text-sm hidden">Invalid credentials</p>
    </div>

    <script>
        async function login() {
            const username = document.getElementById('user').value;
            const password = document.getElementById('pw').value;
            const errorMsg = document.getElementById('errorMsg');

            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username, password })
            });

            if (res.ok) {
                window.location.href = '/admin.html';
            } else {
                errorMsg.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
