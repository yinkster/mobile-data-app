<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rapid Entry</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-4 font-sans">
    <div class="max-w-lg mx-auto bg-white p-6 rounded-2xl shadow-md border border-gray-100">
        <h2 class="text-xl font-bold mb-6 text-gray-800 border-b pb-2">New Entry</h2>
        
        <div class="grid grid-cols-1 gap-4">
            <input id="name" type="text" placeholder="Full Name" class="w-full p-3 border rounded-lg shadow-sm">
            
            <input id="email" type="email" placeholder="Email Address" class="w-full p-3 border rounded-lg shadow-sm">
            
            <div class="grid grid-cols-2 gap-4">
                <select id="cat" class="p-3 border rounded-lg shadow-sm bg-white text-gray-600">
                    <option>Sales</option><option>Expense</option><option>Inventory</option>
                </select>
                <input id="loc" type="text" placeholder="Location" class="p-3 border rounded-lg shadow-sm">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <input id="amt" type="number" step="0.01" placeholder="Amount ($)" class="p-3 border rounded-lg shadow-sm">
                <input id="qty" type="number" placeholder="Quantity" class="p-3 border rounded-lg shadow-sm">
            </div>

            <input id="date" type="date" class="w-full p-3 border rounded-lg shadow-sm text-gray-600">

            <textarea id="note" placeholder="Additional Notes..." class="w-full p-3 border rounded-lg shadow-sm h-24"></textarea>

            <div class="flex items-center space-x-3 p-2">
                <input id="urgent" type="checkbox" class="w-5 h-5 accent-red-600">
                <label for="urgent" class="font-semibold text-red-600">Mark as Urgent</label>
            </div>

            <button onclick="submitData()" id="btn" class="w-full bg-indigo-600 text-white font-bold p-4 rounded-xl shadow-lg active:scale-95 transition-transform">
                SUBMIT DATA
            </button>
        </div>
        <p id="status" class="mt-4 text-center font-medium"></p>
    </div>

    <script>
        async function submitData() {
            const btn = document.getElementById('btn');
            const status = document.getElementById('status');
            btn.innerText = "Processing...";
            
            const data = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                cat: document.getElementById('cat').value,
                amt: document.getElementById('amt').value,
                qty: document.getElementById('qty').value,
                date: document.getElementById('date').value,
                loc: document.getElementById('loc').value,
                note: document.getElementById('note').value,
                urgent: document.getElementById('urgent').checked
            };

            try {
                const res = await fetch('/api/save', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                if (res.ok) {
                    status.innerHTML = "✅ Saved to PostgreSQL";
                    status.className = "mt-4 text-center text-green-600";
                    // Clear fields
                    document.querySelectorAll('input, textarea').forEach(el => el.value = '');
                }
            } catch (e) {
                status.innerText = "❌ Connection Error";
                status.className = "mt-4 text-center text-red-600";
            }
            btn.innerText = "SUBMIT DATA";
        }
    </script>
</body>
</html>
