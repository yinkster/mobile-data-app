<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Engagement Capture</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-4 font-sans">
    <div class="max-w-lg mx-auto bg-white p-6 rounded-2xl shadow-md border border-gray-100">
        <h2 class="text-xl font-bold mb-6 text-gray-800 border-b pb-2">New Person</h2>
        
        <div class="grid grid-cols-1 gap-4">
            <input id="name" type="text" placeholder="Full Name" class="w-full p-3 border rounded-lg shadow-sm">
            
            <input id="email" type="email" placeholder="Email Address" class="w-full p-3 border rounded-lg shadow-sm">
            
            <div class="grid grid-cols-2 gap-4">
                <select id="ev" class="p-3 border rounded-lg shadow-sm bg-white text-gray-600">
                    <option value="" disabled selected>Select Minister</option>
                    <option>Ayo</option><option>Buky</option><option>Debbie</option>
                    <option>Efosa</option><option>Nadesha</option><option>Yinka</option>
                </select>
                <input id="loc" type="text" placeholder="Location" class="p-3 border rounded-lg shadow-sm">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <input id="age" type="number" placeholder="Age" class="p-3 border rounded-lg shadow-sm">
                <input id="tel" type="tel" placeholder="Telephone Number" class="p-3 border rounded-lg shadow-sm">
            </div>

            <input id="date" type="date" class="w-full p-3 border rounded-lg shadow-sm text-gray-600">

            <select id="status" class="w-full p-3 border rounded-lg shadow-sm bg-white text-gray-600">
                <option value="" disabled selected>Select Status</option>
                <option>1. Newly Saved</option>
                <option>2. Already Saved - Interested</option>
                <option>3. Already Saved - Not Interested</option>
                <option>4. Not Saved - Interested</option>
                <option>5. Wants More Information</option>
            </select>

            <textarea id="note" placeholder="Additional Notes..." class="w-full p-3 border rounded-lg shadow-sm h-24"></textarea>

            <div class="flex items-center space-x-3 p-2">
                <input id="urgent" type="checkbox" class="w-5 h-5 accent-red-600">
                <label for="urgent" class="font-semibold text-red-600">Mark as Urgent</label>
            </div>

            <button onclick="submitData()" id="btn" class="w-full bg-indigo-600 text-white font-bold p-4 rounded-xl shadow-lg active:scale-95 transition-transform">
                SUBMIT DATA
            </button>
        </div>
        <p id="responseMsg" class="mt-4 text-center font-medium"></p>
    </div>

    <script>
        async function submitData() {
            const btn = document.getElementById('btn');
            const responseMsg = document.getElementById('responseMsg');
            btn.innerText = "Processing...";
            
            const data = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                ev: document.getElementById('ev').value,
                age: document.getElementById('age').value,
                tel: document.getElementById('tel').value,
                date: document.getElementById('date').value,
                loc: document.getElementById('loc').value,
                status: document.getElementById('status').value,
                note: document.getElementById('note').value,
                urgent: document.getElementById('urgent').checked
            };

            try {
                const res = await fetch('/api/save', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                if (res.ok) {
                    responseMsg.innerHTML = "✅ Saved to PostgreSQL";
                    responseMsg.className = "mt-4 text-center text-green-600";
                    // Clear all fields
                    document.querySelectorAll('input, textarea, select').forEach(el => el.value = '');
                }
            } catch (e) {
                responseMsg.innerText = "❌ Connection Error";
                responseMsg.className = "mt-4 text-center text-red-600";
            }
            btn.innerText = "SUBMIT DATA";
        }
    </script>

    <div class="mt-8 pt-4 border-t border-gray-100 text-center">
    <a href="/admin.html" class="text-xs text-gray-400 hover:text-indigo-600 transition-colors">
        Access Admin Dashboard
    </a>
</div>
</body>
</html>
